<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arthur Sillard</title>
    <script>
        const saved = localStorage.getItem('theme')
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (saved === 'dark' || (!saved && prefersDark)) {
            document.documentElement.classList.add('dark')
        }
    </script>
    <link href="./dist/output.css" rel="stylesheet">
</head>
<body class="bg-classic-white-1 dark:bg-classic-black-1 antialiased">

    <div class="max-w-5xl mx-auto px-3 md:px-6">

        <!-- Header -->
        <header class="flex justify-between items-center p-4">
            <a href="#" class="text-classic-black-text dark:text-classic-white-text text-xl font-semibold tracking-tight">
                Arthur Sillard
            </a>
            <nav class="hidden md:flex items-center gap-8 text-sm text-classic-black-text-muted dark:text-classic-white-text-muted">
                <a href="#Projects" class="hover:text-classic-black-text dark:hover:text-classic-white-text transition">Projets</a>
                <a href="#About" class="hover:text-classic-black-text dark:hover:text-classic-white-text transition">À propos</a>
                <a href="#Contact" class="hover:text-classic-black-text dark:hover:text-classic-white-text transition">Contactez moi</a>
            </nav>
        </header>

                <!-- Hero -->
        <section class="py-8 md:py-10">
            <div class="max-w-3xl mx-auto px-6 py-3">
                <h1 class="text-classic-black-text dark:text-classic-white-text text-xl sm:text-2xl md:text-3xl font-bold tracking-tight">
                    Simulation de particules
                </h1>
                <p class="text-classic-black-text-muted dark:text-classic-white-text-muted mb-4">
                    IUT de Nantes
                </p>
                <a href="assets/CV Arthur Sillard.pdf" download="Arthur_Sillard_CV.pdf"
                   class="bg-azure-blue-400 inline-flex items-center gap-2 px-4 py-2 rounded-2xl text-classic-black-text dark:text-classic-white-text hover:text-classic-white-text shadow-lo-l hover:shadow-button transition-all duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
                    </svg>
                    CV
                </a>
            </div>
        </section>

    <script src="main.js"></script>
</body>
</html>
